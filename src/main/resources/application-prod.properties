# ==================== 生产环境配置（Docker部署） ====================
# 启动命令: docker run -v /your/data/path:/data/volleyball-community ...
# 或: java -jar -Dspring.profiles.active=prod volleyball-community-backend.jar

# ==================== 数据库配置（服务器MySQL） ====================
# 请根据实际服务器配置修改以下内容
spring.datasource.url=jdbc:mysql://121.40.154.188:3306/volleyball_community?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=lihao123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== 文件存储配置 ====================
# Docker部署时，文件存储在宿主机挂载的 volume 目录
# 确保 Docker 运行时将宿主机的目录挂载到此路径
# 示例: docker run -v /opt/volleyball-community/data:/data/volleyball-community ...
file.base-path=/data/volleyball-community
# 文件访问URL留空，使用动态获取（根据请求头自动适配域名）
# 如果使用 Nginx 反向代理，可以设置为固定域名
file.base-url=

# ==================== 服务端口 ====================
server.port=8090

# ==================== 日志配置 ====================
# 生产环境日志级别
logging.level.root=INFO
logging.level.com.volleyball=INFO
# 输出到文件（Docker日志收集）
logging.file.name=/data/volleyball-community/logs/app.log
