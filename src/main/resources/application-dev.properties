# ==================== 开发环境配置 ====================
# 启动命令: ./mvnw spring-boot:run
# 或: java -jar target/volleyball-community-backend.jar --spring.profiles.active=dev

# ==================== 数据库配置（本地MySQL） ====================
spring.datasource.url=jdbc:mysql://localhost:3306/volleyball_community?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== 文件存储配置 ====================
# 开发环境文件存储路径
file.base-path=D:/data/volleyball-community
# 开发环境文件访问URL（使用localhost）
file.base-url=http://localhost:8080/api/file

# ==================== 服务端口 ====================
server.port=8080
