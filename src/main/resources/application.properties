spring.application.name=volleyball-community-backend

# ==================== 数据库配置 ====================
# 具体配置在 application-dev.properties（开发） 或 application-prod.properties（生产）

# ==================== JPA配置 ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==================== JWT配置 ====================
jwt.secret=volleyball-community-secret-key-2026-04-12
jwt.expiration=2592000000

# ==================== 文件上传配置 ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================== 文件存储配置 ====================
# 文件存储根目录（jar包所在目录的相对路径或绝对路径）
file.base-path=${FILE_BASE_PATH:./data/volleyball-community}
# 文件访问基础URL（为空时使用请求动态生成）
file.base-url=${FILE_BASE_URL:}
file.max-size=10485760
file.allowed-types=avatar,post_image

# ==================== 环境标识 ====================
# 默认使用 dev 配置，服务器部署时会通过环境变量自动切换为 prod
# 本地开发: ./mvnw spring-boot:run （默认 dev）
# 服务器: Docker 容器内自动使用 prod
