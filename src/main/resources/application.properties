spring.application.name=volleyball-community-backend

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/volleyball_community?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT配置
jwt.secret=volleyball-community-secret-key-2026-04-12
jwt.expiration=2592000000

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 文件存储配置
file.base-path=D:/data/volleyball-community
file.base-url=http://localhost:8080/api/file
file.max-size=10485760
file.allowed-types=avatar,post_image
